#cloud-config
package_update: true
package_upgrade: true

# Install Docker
packages:
  - docker.io
  - docker-compose-v2

# Disk setup is documentated here: https://docs.cloud-init.io/en/latest/reference/examples.html#disk-setup
# There is a section that specifically covers Azure's disk naming convention.
fs_setup:
  - device: /dev/disk/azure/scsi1/lun10
    filesystem: ext4
    partition: none

# Writing to /etc/fstab so mounts persist on boot
# https://docs.cloud-init.io/en/latest/reference/examples.html#adjust-mount-points-mounted
mounts:
  - [ "/dev/disk/azure/scsi1/lun10", "/data/teamspeak", "ext4", "defaults,nofail", "0", "2" ]

# Enable and start the Docker service
runcmd:
  - systemctl enable docker
  - systemctl start docker
  # Wait for Docker daemon to become ready before running containers (timeout after ~1 minute)
  - bash -c 'for i in {1..60}; do docker info >/dev/null 2>&1 && exit 0; sleep 1; done; echo "Docker failed to become ready within 60 seconds" >&2; exit 1'
  # Start a basic Nginx web server
  - docker run -d --restart=unless-stopped -p 80:80 --name test-nginx nginx:latest

# The commands above will run on first boot of the VM, and will set up Docker and start a test Nginx container.
# On subsequent boots, the container will be restarted automatically by Docker thanks to the --restart policy.
# When used with Terraform as user data for a VM, this file will be passed to the VM and executed on first boot.
# If the contents of this file are changed after attachment to a VM, the changes will not be applied to the VM, as cloud-init only runs on first boot.
# To make the changes reapply, taint the VM resource in Terraform to force it to be recreated, which will trigger cloud-init to run again with the updated user data.
