#cloud-config
package_update: true
package_upgrade: true

bootcmd:
  # Without this, we get a race condition between fs_setup and the disk actually being connected to the machine
  # Terraform attaches the disk to the VM after provisioning the VM, so we need to wait for the disk to actually be attached
  # bootcmd runs super early in the boot process, therefore, we do the wait loop here
  - until [ -e /dev/disk/azure/scsi1/lun10 ]; do sleep 1; done

# Install Docker
packages:
  - docker.io
  - docker-compose-v2

# Disk setup is documentated here: https://docs.cloud-init.io/en/latest/reference/examples.html#disk-setup
# There is a section that specifically covers Azure's disk naming convention.
fs_setup:
  - device: /dev/disk/azure/scsi1/lun10
    filesystem: ext4
    partition: none

# Writing to /etc/fstab so mounts persist on boot
# https://docs.cloud-init.io/en/latest/reference/examples.html#adjust-mount-points-mounted
mounts:
  - [ "/dev/disk/azure/scsi1/lun10", "/data/teamspeak", "ext4", "defaults,nofail", "0", "2" ]

write_files:
  - path: /srv/docker/docker-compose.yaml
    owner: root:root
    permissions: "0644"
    content: |
      services:
        teamspeak:
          image: teamspeaksystems/teamspeak6-server:latest
          container_name: teamspeak-server
          restart: unless-stopped
          ports:
            - "9987:9987/udp"   # Voice Port
            - "30033:30033/tcp" # File Transfer
            - "10080:10080/tcp" # Web Query
          environment:
            - TSSERVER_LICENSE_ACCEPTED=accept
          volumes:
            - /data/teamspeak:/var/tsserver

runcmd:
  # Start Docker
  - systemctl enable docker
  - systemctl start docker
  # Wait for Docker daemon to become ready before running containers (timeout after ~1 minute)
  - bash -c 'for i in {1..60}; do docker info >/dev/null 2>&1 && exit 0; sleep 1; done; echo "Docker failed to become ready within 60 seconds" >&2; exit 1'
  # Create a file for Apache2 to serve, checking whether the mounted directory already exists and is actually a mount point
  - bash -c 'if ! mountpoint -q /data/teamspeak; then echo "ERROR, /data/teamspeak is not a mountpoint; aborting." >&2; exit 1; fi; echo "The external volume was mounted successfully to the /data/teamspeak directory.";'
  # Start a the Teamspeak web server with the mounted directory
  - docker compose -f /srv/docker/docker-compose.yaml up -d

# The commands above will run on first boot of the VM, and will set up Docker and start a the Teamspeak server.
# On subsequent boots, the Teamspeak container will be managed by Docker and restarted per the Compose file's restart policy.
# When used with Terraform as user data for a VM, this file will be passed to the VM and executed on first boot.
# If the contents of this file are changed after attachment to a VM, the changes will not be applied to the VM, as cloud-init only runs on first boot.
# To make the changes reapply, taint the VM resource in Terraform to force it to be recreated, which will trigger cloud-init to run again with the updated user data.
